			background-color: #72859b;
			border-bottom: 1px solid #4d5b6b;

			color: rgb(164, 164, 164);
		}
		.ie7 header a,
		.ie8 header a {

		.ie8 #feed-background {

		#feed-url {
			margin: 5px;

			#feed-url:hover {

			#feed-url:active {
				background-clip: border-box;

			padding: 10px;

			left: 0;
			right: 0;
			bottom: 0;
		}

		#feed-desc * {

		#feed-container {
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			overflow-x: auto;
			overflow-y: auto;
			position: absolute;

		#header-content-divide {
			position: absolute;
			top: 69px;

			right: 0;

			margin: 0;
			padding: 0;

			overflow-x: visible;

	<script>
        /**
         * 将页面中所有 px 单位转换为 pt 单位
         */
        function convertPxToPt() {
            try {
                var conversionFactor = 72 / 96; // 1px = 0.75pt

                // 1. 转换所有内联样式中的 px
                var allElements = document.getElementsByTagName("*");
                for (var i = 0; i < allElements.length; i++) {
                    try {
                        var el = allElements[i];
                        if (el.style && el.style.cssText) {
                            el.style.cssText = el.style.cssText.replace(/(\d+(\.\d+)?)px/gi,
                                function(match, p1) {
                                    return parseFloat(p1) * conversionFactor + "pt";
                                }
                            );
                        }
                    } catch (ignore) {}
                }

                // 2. 转换样式表中的 px
                for (var i = 0; i < document.styleSheets.length; i++) {
                    var styleSheet = document.styleSheets[i];
                    try {
                        // IE7/8 使用 rules，标准浏览器使用 cssRules
                        var rules = styleSheet.cssRules || styleSheet.rules;
                        if (!rules) continue;

                        for (var j = 0; j < rules.length; j++) {
                            try {
                                var rule = rules[j];
                                if (!rule.style) continue;

                                // 遍历该规则的所有属性
                                for (var k = 0; k < rule.style.length; k++) {
                                    var propName = rule.style[k];
                                    // 使用兼容的属性访问方式，替代 getPropertyValue / setProperty
                                    var value = rule.style[propName];
                                    if (typeof value === "string" && value.indexOf("px") !== -1) {
                                        var newValue = value.replace(/(\d+(\.\d+)?)px/gi,
                                            function(match, p1) {
                                                return parseFloat(p1) * conversionFactor + "pt";
                                            }
                                        );
                                        rule.style[propName] = newValue;
                                    }
                                }
                            } catch (ignore) {}
                        }
                    } catch (ignore) {}
                }
            } catch (ignore) {}
        }
	</script>
	<script>
		(function (global) {
			global.setTitle = function (title, url) {
				var titleElement = document.getElementById("feed-title");
				var aElement = titleElement.parentElement;
				aElement.href = url;
				titleElement.innerText = title || "";
				titleElement.title = title || "";
			};
			global.setPubDate = function (pubDate) {
				document.getElementById("feed-pubdate").innerText = pubDate || "";
			};
			global.setChannel = function (channel, url) {
				var channelElement = document.getElementById("feed-channel");
				var aElement = channelElement.parentElement;
				aElement.href = url;
				channelElement.innerText = channel || "";
				channelElement.title = channel || "";
			};
			global.setDesc = function (desc) {
				var descDiv = document.getElementById("feed-desc");
				descDiv.innerHTML = desc;
				try {
					var links = descDiv.getElementsByTagName("a");
					for (var i = 0; i < links.length; i++) {
						var a = links[i];
						a.target = "_blank";
					}
				} catch (e) { }
			};
			global.setUrl = function (url) {
				var urlElement = document.getElementById("feed-url");
				urlElement.setAttribute("href", url);
				urlElement.title = url || "";
			};
			window.onload = function () {
				var btn = document.getElementById("feed-url");
				try { btn.value = external.getString("DETAIL_OPENINBROWSER"); } catch (e) { }
				btn.onclick = function () {
					external.openUrl(btn.getAttribute("href"));
				};
				var titleElement = document.getElementById("feed-title");
				var channelElement = document.getElementById("feed-channel");
				var aTitleElement = titleElement.parentElement;
				var aChannelElement = channelElement.parentElement;
				aTitleElement.onclick = function () {
					external.openUrl(aTitleElement.href);
					return false;
				};
				aChannelElement.onclick = function () {
					external.openUrl(aChannelElement.href);
					return false;
				};
				try {
					convertPxToPt();
				} catch (ignore) { }
			};
		})(this);
	</script>

	<div id="feed-container">

			</a>
			<p id="feed-pubdate"></p>
			<a>
				<h2 id="feed-channel"></h2>
			</a>
		</header>
		<hr id="header-content-divide" />
		<section id="feed-content">
			<input id="feed-url" type="button" value="Open in Web Browser">
			<div id="feed-desc">
			</div>
		</section>
	</div>
